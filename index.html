<!DOCTYPE html>
<html>
<head>
    <title>3D Particle System</title>
    <style>
        body{
            margin:0;
            overflow:hidden;
            background:black;
        }
        canvas{
            display:block;
        }
    </style>
</head>
<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(renderer.domElement);

// Particles
const particleCount = 10000;

const positions = new Float32Array(
    particleCount * 3
);

for(let i=0;i<particleCount;i++){

    positions[i*3] =
        (Math.random()-0.5)*50;

    positions[i*3+1] =
        (Math.random()-0.5)*50;

    positions[i*3+2] =
        (Math.random()-0.5)*50;
}

const geometry =
    new THREE.BufferGeometry();

geometry.setAttribute(
    "position",
    new THREE.BufferAttribute(
        positions,
        3
    )
);

const material =
    new THREE.PointsMaterial({
        size:0.15,
        color:0xff66ff
    });

const particles =
    new THREE.Points(
        geometry,
        material
    );

scene.add(particles);

// Mouse Interaction
let mouseX = 0;
let mouseY = 0;

window.addEventListener(
    "mousemove",
    (event)=>{

        mouseX =
            (event.clientX /
            window.innerWidth) * 2 - 1;

        mouseY =
            -(event.clientY /
            window.innerHeight) * 2 + 1;

        material.color.setHSL(
            (mouseX + 1)/2,
            1,
            0.5
        );
    }
);

// Resize
window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

// Animation
function animate(){

    requestAnimationFrame(
        animate
    );

    particles.rotation.y += 0.002;
    particles.rotation.x += 0.001;

    particles.scale.set(
        1 + Math.abs(mouseX),
        1 + Math.abs(mouseX),
        1 + Math.abs(mouseX)
    );

    renderer.render(
        scene,
        camera
    );
}

animate();

</script>

</body>
</html>
